# buildspec file version
version: 0.2

env:
  variables:
    # App
    APP_PORT: "8080"
    APP_ACCESS_TOKEN_EXPIRES_IN: "1h"
    APP_REFRESH_TOKEN_EXPIRES_IN: "1d"
    APP_UPLOAD_RATE_LIMIT_TTL: "60"
    APP_UPLOAD_RATE_LIMIT: "5"
    APP_UPLOAD_FILE_SIZE_LIMIT_MB: "2"

    NODE_ENV: "testing"

    # DB
    DB_TYPE: "postgres"
    PG_PORT: "5432"

    # S3 bucket
    AWS_S3_URL_EXPIRES_IN_MIN: "15"

  secrets-manager:
    # Private environment variables:
    # App
    APP_JWT: "course-management-api/test:APP_JWT"
    # Postgres

    PG_HOST: "course-management-api/test:PG_HOST"
    PG_PASSWORD: "course-management-api/test:PG_PASSWORD"
    PG_USER: "course-management-api/test:PG_USER"
    AWS_ACCESS_KEY_ID: "course-management-api/test:AWS_ACCESS_KEY_ID"
    AWS_SECRET_ACCESS_KEY: "course-management-api/test:AWS_SECRET_ACCESS_KEY"
    AWS_S3_REGION: "course-management-api/test:AWS_S3_REGION"
    AWS_APP_BUCKET_NAME: "course-management-api/test:AWS_APP_BUCKET_NAME"
    REPO_DOMAIN: "course-management-api/prod:ECR_REPO_DOMAIN"
    REPO_URI: "course-management-api/prod:ECR_REPO_URI"


phases:
  install:
    # runtime-versions:
    #   nodejs: 18.x
    commands:
      - echo Install phase started.
      - npm install -g npm
      - npm install -g @nestjs/cli
      - npm ci
      - echo Install phase completed.

      - echo Logging in to Amazon ECR...
      - aws --version
      - echo "default region:" $AWS_DEFAULT_REGION
      # - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $REPO_DOMAIN
      - aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin 544564125819.dkr.ecr.eu-central-1.amazonaws.com
  pre_build:
    commands:
      - echo Pulling Docker image...
      - docker pull $REPO_URI:latest
  build:
    commands:
      # - echo Nest Build phase started on `date`.
      # - npm run build
      # - echo Nest Build phase completed.

      # - echo Test phase started.
      # - printf '[{"name":"test-build","repo":"%s"}]' $REPO_DOMAIN:$AWS_DEFAULT_REGION > imagedefinitions.json
      # - npm run test
      # - echo Test phase completed.

      - echo Running tests...
      - docker images
      - docker ps
      - docker run $IMAGE_REPO_NAME:latest /bin/bash -c "npm install && npm run test"

# artifacts:
#   files: imagedefinitions.json

reports:
  jest_reports:
    files:
      - junit-report.xml
    file-format: JUNITXML
    base-directory: test/reports
